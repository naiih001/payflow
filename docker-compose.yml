services:
  db:
    image: postgres:16-alpine
    container_name: payflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: payflow
      POSTGRES_USER: payflow
      POSTGRES_PASSWORD: payflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payflow -d payflow']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payflow-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      JWT_SECRET: payflow-dev-secret
      JWT_EXPIRES_IN: 1h
      DATABASE_URL: postgresql://payflow:payflow@db:5432/payflow?schema=public
    ports:
      - '3000:3000'

volumes:
  postgres_data:
